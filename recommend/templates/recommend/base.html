<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{% block title %}电影推荐系统{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- 如果外部CSS中未定义.active样式，可临时添加以下内联样式，建议移至style.css -->
    <style>
        nav a.active {
            font-weight: bold;
            color: #007bff;
            border-bottom: 2px solid #007bff;
        }
    </style>
</head>
<body>
    {% with url_name=request.resolver_match.url_name %}
    <nav>
        <a href="{% url 'index' %}" {% if url_name == 'index' %}class="active"{% endif %}>首页</a>
        <a href="{% url 'movie_list' %}" {% if url_name == 'movie_list' %}class="active"{% endif %}>电影列表</a>
        {% if user.is_authenticated %}
            <a href="{% url 'profile' %}" {% if url_name == 'profile' %}class="active"{% endif %}>个人资料</a>
            <form method="post" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit">登出</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}" {% if url_name == 'login' %}class="active"{% endif %}>登录</a>
            <a href="{% url 'register' %}" {% if url_name == 'register' %}class="active"{% endif %}>注册</a>
        {% endif %}
    </nav>
    {% endwith %}
    <hr>
    {% block content %}{% endblock %}
</body>
</html>
